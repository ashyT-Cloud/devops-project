replicaCount: 3

image:
  repository: ashytcloud/myapp
  tag: "1.0.0"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 5000

config:
  APP_VERSION: "1.0.0"
  APP_ENV: "production"
  LOG_LEVEL: "WARNING"
  PORT: "5000"

secret:
  SECRET_KEY: ZGV2b3BzLXNlY3JldC1rZXktMTIz
  DB_PASSWORD: c3VwZXJzZWNyZXRwYXNz

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 50

resources:
  requests:
    memory: "128Mi"
    cpu: "200m"
  limits:
    memory: "256Mi"
    cpu: "500m"

livenessProbe:
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 3
  timeoutSeconds: 5

readinessProbe:
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 3
  timeoutSeconds: 3

strategy:
  maxSurge: 1
  maxUnavailable: 0
