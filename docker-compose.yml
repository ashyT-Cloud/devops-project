version: "3.9"

services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - APP_VERSION=1.0.0
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    volumes:
      - ./app.py:/app/app.py     # hot reload in dev

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data          # persists data across restarts

volumes:
  redis_data:
