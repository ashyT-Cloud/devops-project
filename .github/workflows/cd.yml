name: CD Pipeline — EKS

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
    branches: [main]

jobs:
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --name devops-cluster \
            --region us-east-1

      - name: Verify cluster access
        run: |
          kubectl config current-context
          kubectl get nodes

      - name: Ensure namespace exists
        run: |
          kubectl create namespace production \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Deploy to EKS with Helm
        run: |
          helm upgrade --install myapp-prod Day-9-Helm/flask-chart \
            -f Day-10-EKS/helm-values/values-prod.yaml \
            --namespace production

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/myapp-prod-flask-chart \
            -n production --timeout=120s

      - name: Smoke test
        run: |
          ALB_URL=$(kubectl get ingress flask-ingress -n production \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          echo "ALB URL: $ALB_URL"
          sleep 20
          curl -f http://$ALB_URL/health
